<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid OS | Enterprise</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; user-select: none; font-family: 'Inter', sans-serif; }

        /* WALLPAPER */
        #desktop-bg {
            position: absolute; inset: 0; background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            background-size: cover; background-position: center; z-index: 0; transition: filter 0.8s, transform 0.8s;
        }
        .bg-blurred { filter: blur(30px) brightness(0.4) !important; transform: scale(1.05); }

        /* GLASS MATERIAL */
        .lucid-glass {
            background: rgba(15, 15, 18, 0.65); backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* SCREENS */
        #lock-screen, #os-workspace { position: absolute; inset: 0; display: none; z-index: 10; flex-direction: column; }
        .active-screen { display: flex !important; }

        /* LOCK SCREEN UI */
        .auth-input { width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 16px; border-radius: 8px; outline: none; margin-bottom: 12px; transition: 0.2s; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
        .auth-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .auth-btn { width: 100%; background: #3b82f6; color: white; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; margin-bottom: 8px; }
        .auth-btn:hover { background: #2563eb; }

        /* OS UI (TOPBAR, DOCK, LAUNCHPAD) */
        #topbar { height: 32px; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 12px; font-weight: 500; z-index: 50; position: relative; }
        
        #launchpad { position: absolute; inset: 0; z-index: 40; display: flex; flex-direction: column; align-items: center; padding-top: 8%; opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); background: rgba(0,0,0,0.6); backdrop-filter: blur(20px); }
        #launchpad.active { opacity: 1; pointer-events: auto; }
        .app-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 24px 32px; max-width: 900px; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .app-item:hover { transform: translateY(-5px) scale(1.05); }
        .app-icon-lg { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); font-size: 30px; color: white; transition: 0.2s; background: rgba(30,30,35,0.9); }
        .app-label { font-size: 12px; font-weight: 500; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        #dock-container { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 50; pointer-events: none; }
        .dock { display: flex; gap: 10px; padding: 10px; border-radius: 24px; pointer-events: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .dock-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; background: rgba(255,255,255,0.05); }
        .dock-icon:hover { transform: scale(1.15) translateY(-5px); margin: 0 5px; background: rgba(255,255,255,0.1); }

        /* ADMIN PANEL OVERLAY */
        #admin-panel { position: absolute; inset: 0; background: #0a0a0c; z-index: 100; display: none; flex-direction: column; backdrop-filter: blur(2px); }
        .admin-scroll { max-height: 60vh; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="desktop-bg" class="bg-blurred"></div>

    <div id="boot" class="absolute inset-0 bg-[#050505] z-[999] flex flex-col items-center justify-center transition-opacity duration-1000">
        <h1 class="text-5xl font-bold tracking-[0.5em] text-white" style="text-shadow: 0 0 40px rgba(255,255,255,0.3);">LUCID</h1>
        <div class="mt-8 text-xs text-blue-500 font-mono animate-pulse" id="boot-status">Verifying System Integrity...</div>
    </div>

    <div id="lock-screen" class="items-center justify-center">
        <div class="absolute top-10 left-10 cursor-pointer opacity-50 hover:opacity-100 transition" onclick="triggerAdmin()" title="System Root Access">
            <i data-lucide="droplet" class="w-8 h-8 text-blue-500"></i>
        </div>

        <div class="lucid-glass p-10 w-[400px] rounded-2xl flex flex-col items-center">
            <div class="w-16 h-16 bg-zinc-800 rounded-full flex items-center justify-center mb-4 border border-zinc-700">
                <i data-lucide="user" class="w-8 h-8 text-gray-400"></i>
            </div>
            <h1 class="text-2xl font-bold mb-1">System Locked</h1>
            <p class="text-gray-400 text-xs mb-6 uppercase tracking-widest">Identify Yourself</p>

            <div id="auth-error" class="text-red-400 text-xs mb-4 text-center hidden w-full bg-red-500/10 p-2 rounded"></div>

            <input type="email" id="auth-email" class="auth-input" placeholder="Email Address">
            <input type="password" id="auth-pass" class="auth-input" placeholder="Password">
            
            <button class="auth-btn" onclick="loginOS()">Unlock OS</button>
            <button class="auth-btn bg-zinc-800 hover:bg-zinc-700 mt-2" onclick="registerOS()">Apply for Identity</button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="h-14 bg-zinc-900 border-b border-white/10 flex items-center justify-between px-6">
            <div class="flex items-center gap-2 text-red-500 font-bold"><i data-lucide="shield-alert"></i> LUCID OVERSEER</div>
            <button class="text-xs font-bold text-gray-400 hover:text-white" onclick="document.getElementById('admin-panel').style.display='none'">Close Terminal</button>
        </div>
        <div class="p-10 max-w-4xl mx-auto w-full">
            <h2 class="text-2xl font-bold mb-6">Developer Applications</h2>
            <div class="lucid-glass p-6 rounded-xl admin-scroll" id="admin-list">
                <p class="text-zinc-500 text-sm">Fetching network requests...</p>
            </div>
        </div>
    </div>

    <div id="os-workspace">
        <div id="topbar">
            <div class="flex items-center gap-4 h-full">
                <div class="cursor-pointer hover:text-blue-400 transition flex items-center gap-1 font-bold"><i data-lucide="droplet" class="w-3 h-3"></i> LUCID</div>
                <div class="cursor-pointer hover:text-gray-300">File</div>
                <div class="cursor-pointer hover:text-gray-300">Edit</div>
                <div class="cursor-pointer hover:text-gray-300" onclick="toggleLaunchpad()">Apps</div>
            </div>
            <div class="flex items-center gap-4 h-full">
                <span id="user-display" class="text-blue-400 font-bold mr-2">User</span>
                <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
                <i data-lucide="battery-medium" class="w-4 h-4"></i>
                <div id="tb-time">12:00 AM</div>
                <button onclick="logoutOS()" class="ml-2 text-red-400 hover:text-red-300 font-bold text-xs">Log Out</button>
            </div>
        </div>

        <div id="launchpad" onclick="if(event.target === this) toggleLaunchpad()">
            <div class="app-grid" id="app-grid-container">
                <div class="app-item" onclick="alert('Store opening...\nWelcome to Lucid Store')"><div class="app-icon-lg bg-white/10 shadow-[0_0_20px_rgba(59,130,246,0.3)]"><i data-lucide="shopping-bag" class="text-blue-400"></i></div><span class="app-label">Store</span></div>
                <div class="app-item" onclick="alert('Settings opening...\nCustomize your experience')"><div class="app-icon-lg bg-gray-700"><i data-lucide="settings-2" class="text-gray-300"></i></div><span class="app-label">Settings</span></div>
                <div class="app-item" onclick="alert('Drive opening...\nCloud storage ready')"><div class="app-icon-lg bg-zinc-800 border border-blue-500/50"><i data-lucide="hard-drive" class="text-blue-400"></i></div><span class="app-label">Drive</span></div>
                <div class="app-item" onclick="alert('Monitor opening...\nSystem performance')"><div class="app-icon-lg bg-zinc-900 border border-green-500/50"><i data-lucide="activity" class="text-green-400"></i></div><span class="app-label">Monitor</span></div>
                
                <div id="dynamic-dev-tools" class="contents"></div>
            </div>
        </div>

        <div id="dock-container">
            <div class="dock lucid-glass">
                <div class="dock-icon" onclick="toggleLaunchpad()" title="Launchpad"><i data-lucide="grid" class="text-blue-400"></i></div>
                <div class="w-px h-8 bg-white/10 my-auto mx-1"></div>
                <div class="dock-icon" title="Store" onclick="alert('Store')"><i data-lucide="shopping-bag" class="text-white"></i></div>
                <div class="dock-icon" title="Settings" onclick="alert('Settings')"><i data-lucide="settings-2" class="text-white"></i></div>
                <div class="dock-icon" title="Launchpad" onclick="toggleLaunchpad()"><i data-lucide="apps" class="text-white"></i></div>
            </div>
        </div>
    </div>


    <script type="module">
        lucide.createIcons();
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhkwFbMlD7DJPtNPV2cBfb3uwlvBSm7h0",
            authDomain: "lucide-os.firebaseapp.com",
            projectId: "lucide-os",
            storageBucket: "lucide-os.firebasestorage.app",
            messagingSenderId: "211467529543",
            appId: "1:211467529543:web:fc5c65a89aef44c4823062",
            measurementId: "G-HJ5DWFL2S8"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const lockScreen = document.getElementById('lock-screen');
        const osWorkspace = document.getElementById('os-workspace');
        const desktopBg = document.getElementById('desktop-bg');
        const errBox = document.getElementById('auth-error');

        window.showError = (msg) => { errBox.innerText = msg; errBox.classList.remove('hidden'); };
        window.clearError = () => { errBox.classList.add('hidden'); };

        window.toggleLaunchpad = () => {
            const lp = document.getElementById('launchpad');
            lp.classList.toggle('active');
            desktopBg.classList.toggle('bg-blurred');
        };

        // --- AUTHENTICATION (NORMAL USERS) ---
        window.loginOS = async () => {
            clearError();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) { showError("Please enter email and password"); return; }
            try { await signInWithEmailAndPassword(auth, email, pass); } 
            catch (error) { showError(error.message); }
        };

        window.registerOS = async () => {
            clearError();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass || pass.length < 6) { showError("Password must be at least 6 characters"); return; }
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                // NORMAL USER REGISTRATION - Instantly allowed in OS
                await setDoc(doc(db, "users", cred.user.uid), {
                    email: cred.user.email,
                    isDeveloper: false,
                    applicationStatus: 'none', // Not pending yet
                    createdAt: new Date()
                });
                // No signout! They boot straight into the OS.
            } catch (error) { showError(error.message); }
        };

        window.logoutOS = () => { signOut(auth); };

        // --- APPLY FOR DEV ACCOUNT ---
        window.applyForDev = async () => {
            const user = auth.currentUser;
            if(user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if(userDoc.exists() && userDoc.data().applicationStatus === 'pending') {
                    alert("Your application is already pending approval.");
                    return;
                }
                await updateDoc(doc(db, "users", user.uid), { applicationStatus: 'pending' });
                alert("Application submitted! Awaiting Admin Overseer approval.");
                // Refresh the UI
                const event = new Event('authStateChanged');
                document.dispatchEvent(event);
                // also reload UI icons
                const devContainer = document.getElementById('dynamic-dev-tools');
                devContainer.innerHTML = `
                    <div class="app-item opacity-50 cursor-not-allowed">
                        <div class="app-icon-lg bg-zinc-900 border border-yellow-500">
                            <i data-lucide="clock" class="text-yellow-400"></i>
                        </div>
                        <span class="app-label text-yellow-500">Dev Pending</span>
                    </div>
                `;
                lucide.createIcons();
            } else {
                alert("You must be logged in to apply.");
            }
        };

        // --- STATE OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            const bootScreen = document.getElementById('boot');
            
            if (user) {
                document.getElementById('boot-status').innerText = "Loading Workspace...";
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();

                    // 1. Let everyone into the OS
                    document.getElementById('user-display').innerText = user.email.split('@')[0];
                    lockScreen.classList.remove('active-screen');
                    osWorkspace.classList.add('active-screen');
                    desktopBg.classList.remove('bg-blurred');

                    // 2. Render Developer Tools conditionally
                    const devContainer = document.getElementById('dynamic-dev-tools');
                    if (userData.isDeveloper) {
                        // APPROVED: Give them Luco Studio
                        devContainer.innerHTML = `
                            <div class="app-item" onclick="alert('Launching Luco Studio IDE...\\nWelcome Developer! Full access granted.')">
                                <div class="app-icon-lg bg-gradient-to-br from-purple-900 to-indigo-900 border border-purple-500 shadow-[0_0_20px_rgba(168,85,247,0.6)]">
                                    <i data-lucide="code-2" class="text-purple-300 w-8 h-8"></i>
                                </div>
                                <span class="app-label text-purple-300 font-bold">Luco Studio</span>
                            </div>
                        `;
                    } else if (userData.applicationStatus === 'pending') {
                        // PENDING: Show they are waiting
                        devContainer.innerHTML = `
                            <div class="app-item opacity-70">
                                <div class="app-icon-lg bg-zinc-800 border border-yellow-500/70">
                                    <i data-lucide="clock" class="text-yellow-400 w-7 h-7"></i>
                                </div>
                                <span class="app-label text-yellow-400">Dev Pending</span>
                            </div>
                        `;
                    } else {
                        // NORMAL USER: Show the application button
                        devContainer.innerHTML = `
                            <div class="app-item" onclick="applyForDev()">
                                <div class="app-icon-lg bg-zinc-800 border border-zinc-600 hover:border-blue-500 transition">
                                    <i data-lucide="award" class="text-gray-300 w-7 h-7"></i>
                                </div>
                                <span class="app-label text-gray-300">Apply for Dev</span>
                            </div>
                        `;
                    }
                    lucide.createIcons();
                    
                    // Hide boot
                    bootScreen.style.opacity = '0';
                    setTimeout(() => bootScreen.style.display = 'none', 1000);
                } else {
                    // edge case: create missing doc
                    await setDoc(doc(db, "users", user.uid), {
                        email: user.email,
                        isDeveloper: false,
                        applicationStatus: 'none',
                        createdAt: new Date()
                    });
                    location.reload();
                }
            } else {
                // Lock the OS
                lockScreen.classList.add('active-screen');
                osWorkspace.classList.remove('active-screen');
                desktopBg.classList.add('bg-blurred');
                bootScreen.style.opacity = '0';
                setTimeout(() => bootScreen.style.display = 'none', 1000);
                // clear inputs
                document.getElementById('auth-email').value = '';
                document.getElementById('auth-pass').value = '';
                clearError();
            }
        });

        // --- SECRET ADMIN PANEL ---
        window.triggerAdmin = async () => {
            const pass = prompt("ROOT ACCESS REQUIRED:");
            if (pass === "lucide@latestpass") {
                document.getElementById('admin-panel').style.display = 'flex';
                loadAdminPanel();
            } else if (pass !== null) { alert("ACCESS DENIED."); }
        };

        async function loadAdminPanel() {
            const adminList = document.getElementById('admin-list');
            if(!adminList) return;
            adminList.innerHTML = '<p class="text-zinc-400">Loading applications...</p>';
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                let html = '';
                let hasPending = false;
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (data.applicationStatus === 'pending') {
                        hasPending = true;
                        html += `
                            <div class="flex justify-between items-center p-4 bg-[#0a0a0f] border border-white/10 rounded-xl mb-3 backdrop-blur-sm">
                                <div><div class="font-bold text-white">${escapeHtml(data.email)}</div><div class="text-xs text-yellow-400 uppercase tracking-wider flex items-center gap-1 mt-1"><i data-lucide="clock" class="w-3 h-3"></i> Pending Approval</div></div>
                                <div class="flex gap-3">
                                    <button class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-1.5 text-xs rounded-lg font-semibold transition shadow-lg" onclick="approveUser('${docSnap.id}')">✓ Accept</button>
                                    <button class="bg-rose-600 hover:bg-rose-500 text-white px-5 py-1.5 text-xs rounded-lg font-semibold transition" onclick="rejectUser('${docSnap.id}')">✗ Decline</button>
                                </div>
                            </div>
                        `;
                    }
                });
                if(!hasPending) {
                    adminList.innerHTML = '<div class="text-green-400 font-mono text-center p-8"><i data-lucide="check-circle" class="inline-block w-5 h-5 mr-2"></i> No pending applications. System clear.</div>';
                    lucide.createIcons();
                } else {
                    adminList.innerHTML = html;
                    lucide.createIcons();
                }
            } catch (e) { adminList.innerHTML = `<p class="text-red-400 bg-red-500/10 p-3 rounded">Error: ${e.message}</p>`; }
        }

        window.approveUser = async (uid) => { 
            await updateDoc(doc(db, "users", uid), { isDeveloper: true, applicationStatus: 'approved' }); 
            loadAdminPanel();
            // optional: notify if user is online? They will see change on next auth refresh
        };
        window.rejectUser = async (uid) => { 
            await updateDoc(doc(db, "users", uid), { isDeveloper: false, applicationStatus: 'rejected' }); 
            loadAdminPanel();
        };

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        setInterval(() => { 
            const timeEl = document.getElementById('tb-time');
            if(timeEl) timeEl.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); 
        }, 1000);
        
        // Initial icons refresh after dynamic content
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
