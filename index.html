<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucid OS | Enterprise</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Black_droplet.svg/512px-Black_droplet.svg.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] } } }
        }
    </script>
    <style>
        body { background: #000; color: #fff; height: 100vh; overflow: hidden; user-select: none; -webkit-user-select: none; touch-action: none; }

        /* WALLPAPER & WIDGET */
        #desktop { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: 0; transition: transform 0.6s, filter 0.6s; }
        #desktop.blurred { transform: scale(1.03); filter: blur(25px) brightness(0.4); }

        #desktop-widget { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none; text-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 10; transition: opacity 0.3s; }
        #dw-time { font-size: clamp(60px, 10vw, 80px); font-weight: 300; letter-spacing: -2px; line-height: 1; }
        #dw-date { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.8); margin-top: 10px; text-align: center; }

        /* GLASS MATERIAL */
        .lucid-glass { background: rgba(15, 15, 18, 0.65); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }

        /* TOPBAR */
        #topbar { position: fixed; top: 0; width: 100%; height: 32px; z-index: 50; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; font-weight: 500; }
        
        /* WINDOW MANAGER */
        .window { position: absolute; display: flex; flex-direction: column; border-radius: 12px; overflow: hidden; opacity: 0; transform: scale(0.95) translateY(10px); transition: opacity 0.2s, transform 0.25s cubic-bezier(0.19, 1, 0.22, 1); box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 30px 60px rgba(0,0,0,0.6); }
        .window.open { opacity: 1; transform: scale(1) translateY(0); }
        .window.active { box-shadow: 0 0 0 1px rgba(255,255,255,0.15), 0 40px 80px rgba(0,0,0,0.8); }

        .win-header { height: 40px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: rgba(20,20,22,0.9); border-bottom: 1px solid rgba(255,255,255,0.05); touch-action: none; }
        .win-content { flex: 1; background: #0a0a0c; position: relative; }
        .win-content iframe { width: 100%; height: 100%; border: none; background: #0a0a0c; }
        .drag-shield { position: absolute; inset: 0; display: none; z-index: 50; }
        .window.dragging .drag-shield { display: block; }

        .win-controls { display: flex; gap: 8px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; position: relative; }
        .btn-close { background: #ff5f56; } .btn-min { background: #ffbd2e; } .btn-max { background: #27c93f; }
        
        /* LAUNCHPAD */
        #launchpad { position: fixed; inset: 0; z-index: 90; display: flex; flex-direction: column; align-items: center; padding-top: 15%; opacity: 0; pointer-events: none; transition: 0.4s; overflow-y: auto; padding-bottom: 100px; }
        #launchpad.active { opacity: 1; pointer-events: auto; }

        .search-bar { width: 90%; max-width: 600px; height: 50px; border-radius: 25px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 20px; margin-bottom: 30px; }
        .search-bar input { flex: 1; background: transparent; border: none; outline: none; color: white; font-size: 16px; margin-left: 10px; }

        .app-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 20px; width: 90%; max-width: 900px; }
        .app-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .app-item:hover .app-icon-lg { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .app-icon-lg { width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); font-size: 28px; color: white; transition: 0.2s; }
        .app-label { font-size: 11px; font-weight: 500; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); text-align: center; white-space: nowrap; }

        /* DOCK */
        #dock-container { position: fixed; bottom: 15px; width: 100%; display: flex; justify-content: center; z-index: 100; pointer-events: none; }
        .dock { display: flex; gap: 8px; padding: 8px; border-radius: 24px; pointer-events: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.8); max-width: 95vw; overflow-x: auto; scrollbar-width: none; }
        .dock::-webkit-scrollbar { display: none; }
        .dock-icon { width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.05); flex-shrink: 0; transition: 0.2s; }
        .dock-icon:hover { background: rgba(255,255,255,0.1); transform: scale(1.1); }
        .dock-icon.active::after { content: ''; position: absolute; bottom: -4px; width: 4px; height: 4px; background: #fff; border-radius: 50%; }

        /* CONTEXT MENU & MODALS */
        #context-menu { position: absolute; width: 240px; display: none; flex-direction: column; border-radius: 14px; padding: 6px; z-index: 9999; }
        .ctx-item { padding: 10px 14px; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.1s; color: #e4e4e7; }
        .ctx-item:hover { background: #3b82f6; color: white; }

        #personalize-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.95); width: 90%; max-width: 450px; z-index: 10000; opacity: 0; pointer-events: none; transition: 0.3s; }
        #personalize-modal.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        .p-input { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px; border-radius: 8px; outline: none; font-size: 13px; margin-top: 6px; }
        .p-input:focus { border-color: #3b82f6; }

        /* MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            .hide-mobile { display: none !important; }
            .app-grid { grid-template-columns: repeat(4, 1fr); gap: 15px; }
            .app-icon-lg { width: 54px; height: 54px; border-radius: 14px; font-size: 24px; }
            .window { width: 100% !important; height: calc(100% - 32px) !important; left: 0 !important; top: 32px !important; border-radius: 0; }
            .btn-max { display: none; }
            #launchpad { padding-top: 25%; }
            #pwa-install-toast { width: 90%; flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

    <div id="boot" class="fixed inset-0 bg-[#050505] z-[999] flex flex-col items-center justify-center transition-opacity duration-1000">
        <h1 class="text-5xl font-bold tracking-[0.5em] text-white opacity-0 transition-opacity duration-1000" id="boot-text" style="text-shadow: 0 0 40px rgba(255,255,255,0.3);">LUCID</h1>
        <div class="mt-8 w-48 h-0.5 bg-zinc-900 rounded-full overflow-hidden">
            <div id="boot-bar" class="h-full bg-white w-0 transition-all duration-[1500ms] ease-in-out"></div>
        </div>
    </div>

    <div id="pwa-install-toast" class="fixed top-12 left-1/2 transform -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-full lg:rounded-full rounded-2xl shadow-[0_10px_40px_rgba(59,130,246,0.6)] flex items-center gap-4 z-[9999] transition-all duration-500 -translate-y-32 opacity-0 cursor-pointer" onclick="triggerPWAInstall()">
        <i data-lucide="download-cloud" class="w-6 h-6 hide-mobile"></i>
        <div class="flex flex-col">
            <span class="font-bold text-sm leading-tight">Install Lucid OS</span>
            <span class="text-[10px] text-blue-200 uppercase tracking-widest">Native App Experience</span>
        </div>
        <button class="ml-auto bg-white text-blue-600 px-4 py-1.5 rounded-full text-xs font-bold hover:bg-gray-100 transition">Install</button>
    </div>

    <div id="desktop" onclick="handleDesktopClick(event)" oncontextmenu="openContextMenu(event)"></div>

    <div id="context-menu" class="lucid-glass">
        <div class="ctx-item" onclick="refreshKernel()"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh Kernel</div>
        <div class="h-px bg-white/10 my-1 mx-2"></div>
        <div class="ctx-item" onclick="openPersonalize()"><i data-lucide="image" class="w-4 h-4"></i> Personalize Screen</div>
        <div class="ctx-item" onclick="openFullscreen()"><i data-lucide="monitor" class="w-4 h-4"></i> Enter Fullscreen</div>
    </div>

    <div id="personalize-modal" class="lucid-glass rounded-2xl p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold">Personalize The Screen</h2>
            <i data-lucide="x" class="w-5 h-5 cursor-pointer hover:text-red-400 transition" onclick="closePersonalize()"></i>
        </div>
        <div class="mb-5">
            <label class="text-xs text-gray-400 font-bold uppercase tracking-wide">Wallpaper URL</label>
            <input type="text" id="inp-wall" class="p-input" placeholder="https://example.com/image.jpg">
        </div>
        <div class="mb-6">
            <label class="text-xs text-gray-400 font-bold uppercase tracking-wide">Cursor URL</label>
            <input type="text" id="inp-cursor" class="p-input" placeholder="https://example.com/cursor.png">
        </div>
        <div class="flex justify-end gap-3">
            <button class="px-4 py-2 rounded-lg text-sm font-bold bg-white/5 hover:bg-white/10 transition" onclick="resetPersonalize()">Reset</button>
            <button class="px-4 py-2 rounded-lg text-sm font-bold bg-blue-600 hover:bg-blue-500 transition shadow-[0_0_15px_rgba(59,130,246,0.5)]" onclick="applyPersonalize()">Apply</button>
        </div>
    </div>

    <div id="desktop-widget">
        <div id="dw-time">12:00</div>
        <div id="dw-date">Monday, January 1</div>
    </div>

    <div id="topbar">
        <div class="flex items-center gap-4 h-full pointer-events-auto">
            <div class="cursor-pointer font-bold"><i data-lucide="droplet" class="w-3 h-3 inline"></i> LUCID</div>
            <div class="cursor-pointer hide-mobile" onclick="openPersonalize()">Edit</div>
            <div class="cursor-pointer hide-mobile">View</div>
        </div>
        <div class="flex items-center gap-3 h-full pointer-events-auto">
            <span class="text-blue-400 font-bold mr-1 hide-mobile" id="user-name">SpydeY</span>
            <i data-lucide="wifi" class="w-3.5 h-3.5"></i>
            <i data-lucide="battery-medium" class="w-4 h-4"></i>
            <div id="tb-time">12:00 AM</div>
        </div>
    </div>

    <div id="windows" class="absolute inset-0 overflow-hidden pointer-events-none mt-8"></div>

    <div id="launchpad" onclick="if(event.target === this) toggleStart()">
        <div class="search-bar lucid-glass">
            <i data-lucide="search" class="w-5 h-5 text-gray-400"></i>
            <input type="text" id="app-search" placeholder="Search apps..." onkeyup="filterApps()">
        </div>
        
        <div class="app-grid" id="app-grid-container">
            <div class="app-item" data-name="store" onclick="launch('store', 'Lucid Store', 'app/store.html', 1000, 700)"><div class="app-icon-lg bg-white shadow-[0_0_20px_rgba(255,255,255,0.4)]"><i data-lucide="shopping-bag" class="text-blue-600"></i></div><span class="app-label">Store</span></div>
            <div class="app-item" data-name="settings" onclick="launch('settings', 'Settings', 'app/settings.html', 700, 500)"><div class="app-icon-lg bg-gray-600"><i data-lucide="settings-2"></i></div><span class="app-label">Settings</span></div>
            <div class="app-item" data-name="drive" onclick="launch('drive', 'Lucid Drive', 'app/drive.html', 850, 600)"><div class="app-icon-lg bg-zinc-800 border border-blue-500/50"><i data-lucide="hard-drive" class="text-blue-400"></i></div><span class="app-label">Drive</span></div>
            <div class="app-item" data-name="monitor" onclick="launch('monitor', 'Activity Monitor', 'app/monitor.html', 900, 600)"><div class="app-icon-lg bg-zinc-900 border border-green-500/50"><i data-lucide="activity" class="text-green-400"></i></div><span class="app-label">Monitor</span></div>
            <div class="app-item" data-name="terminal" onclick="launch('terminal', 'Lucid Terminal', 'app/terminal.html', 700, 450)"><div class="app-icon-lg bg-black border border-green-500/30"><i data-lucide="terminal" class="text-green-500"></i></div><span class="app-label">Terminal</span></div>
            <div class="app-item" data-name="nexus" onclick="launch('nexus', 'Nexus API', 'app/nexus.html', 900, 650)"><div class="app-icon-lg bg-zinc-900 border border-blue-500/50"><i data-lucide="network" class="text-blue-400"></i></div><span class="app-label">Nexus</span></div>
            <div class="app-item" data-name="lunotes" onclick="launch('lunotes', 'Lunotes', 'app/lunotes.html', 950, 650)"><div class="app-icon-lg bg-zinc-900 border border-blue-500/50"><i data-lucide="book-open" class="text-blue-400"></i></div><span class="app-label">Lunotes</span></div>
            
            <div class="app-item" data-name="aura" onclick="launch('aura', 'AURA Studio', 'app/aura.html', 800, 600)"><div class="app-icon-lg bg-gradient-to-tr from-cyan-500 to-blue-600"><i data-lucide="waves"></i></div><span class="app-label">AURA</span></div>
            <div class="app-item" data-name="luma" onclick="launch('luma', 'Luma Palette', 'app/lumixpro.html', 900, 650)"><div class="app-icon-lg bg-purple-600"><i data-lucide="palette"></i></div><span class="app-label">Luma</span></div>
            <div class="app-item" data-name="typelab" onclick="launch('typelab', 'Type Lab', 'app/typex.html', 800, 500)"><div class="app-icon-lg bg-emerald-600"><i data-lucide="keyboard"></i></div><span class="app-label">Type Lab</span></div>

            <div class="app-item" data-name="defense" onclick="launch('defense', 'Cyber Defense', 'arcade/defense.html', 1000, 700)"><div class="app-icon-lg bg-indigo-900 border border-indigo-500/50"><i data-lucide="shield-alert" class="text-indigo-400"></i></div><span class="app-label">Defense</span></div>
            <div class="app-item" data-name="quantum" onclick="launch('quantum', 'Quantum Core', 'arcade/quantum.html', 900, 600)"><div class="app-icon-lg bg-zinc-900 border border-blue-500/30"><i data-lucide="cpu" class="text-blue-500"></i></div><span class="app-label">Quantum</span></div>
            <div class="app-item" data-name="chroma" onclick="launch('chroma', 'Chroma Lab', 'arcade/chroma.html', 600, 700)"><div class="app-icon-lg bg-gradient-to-br from-indigo-500 to-purple-600"><i data-lucide="flask-conical" class="text-white"></i></div><span class="app-label">Chroma</span></div>
            <div class="app-item" data-name="vortex" onclick="launch('vortex', 'Vortex', 'arcade/vortex.html', 700, 700)"><div class="app-icon-lg bg-black border border-purple-500"><i data-lucide="hexagon" class="text-purple-400"></i></div><span class="app-label">Vortex</span></div>
            <div class="app-item" data-name="rhythm" onclick="launch('rhythm', 'Rhythm Core', 'arcade/rhythm.html', 600, 800)"><div class="app-icon-lg bg-black border border-cyan-500"><i data-lucide="music-2" class="text-cyan-400"></i></div><span class="app-label">Rhythm</span></div>
            <div class="app-item" data-name="dash" onclick="launch('dash', 'Neon Dash', 'arcade/dash.html', 800, 500)"><div class="app-icon-lg bg-black border border-white/20"><i data-lucide="zap" class="text-yellow-400 fill-current"></i></div><span class="app-label">Dash</span></div>
            <div class="app-item" data-name="gravity" onclick="launch('gravity', 'Gravity Jet', 'arcade/gravity.html', 800, 500)"><div class="app-icon-lg bg-gradient-to-t from-blue-700 to-cyan-400"><i data-lucide="rocket" class="text-white transform rotate-45"></i></div><span class="app-label">Gravity</span></div>
        </div>
    </div>

    <div id="dock-container">
        <div class="dock lucid-glass" id="main-dock">
            <div class="dock-icon" onclick="toggleStart()"><i data-lucide="grid" class="text-blue-500"></i></div>
            <div class="w-px h-6 bg-white/10 my-auto mx-1"></div>
            <div id="task-apps" class="flex gap-2"></div>
        </div>
    </div>

    <div id="toast-area" class="fixed bottom-24 right-4 z-[999] flex flex-col gap-2"></div>

    <script>
        // --- ⚙️ PWA ENGINE & NATIVE INSTALL TRIGGER ---
        let deferredPrompt;

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('PWA SW Registration failed:', err));
            });
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            setTimeout(() => {
                const installToast = document.getElementById('pwa-install-toast');
                installToast.classList.remove('-translate-y-32', 'opacity-0');
                installToast.classList.add('translate-y-0', 'opacity-100');
                lucide.createIcons();
            }, 2000); 
        });

        window.triggerPWAInstall = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-install-toast').style.display = 'none';
                }
                deferredPrompt = null;
            }
        };

        window.addEventListener('appinstalled', () => {
            document.getElementById('pwa-install-toast').style.display = 'none';
            showToast('Lucid OS successfully installed', 'check-circle');
        });

        // --- CORE OS CONFIG ---
        const DEFAULT_CONFIG = { wall: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop" };

        window.onload = () => {
            lucide.createIcons();
            loadPersonalization();
            startClock();
            
            window.addEventListener('message', (e) => {
                if (e.data === 'user_updated') document.getElementById('user-name').innerText = localStorage.getItem('vertex_user') || 'SpydeY';
            });
            document.getElementById('user-name').innerText = localStorage.getItem('vertex_user') || 'SpydeY';

            setTimeout(() => {
                document.getElementById('boot-text').style.opacity = '1';
                document.getElementById('boot-bar').style.width = '100%';
            }, 300);
            
            setTimeout(() => {
                const boot = document.getElementById('boot');
                boot.style.opacity = '0';
                setTimeout(() => { boot.remove(); showToast('Welcome to Lucid OS', 'droplet'); }, 1000);
            }, 2000);
        };

        // --- PERSONALIZATION ---
        function loadPersonalization() {
            const savedWall = localStorage.getItem('lucid_wall') || DEFAULT_CONFIG.wall;
            const savedCursor = localStorage.getItem('lucid_cursor') || "auto";
            document.getElementById('desktop').style.backgroundImage = `url('${savedWall}')`;
            if(savedCursor !== "auto") document.body.style.cursor = `url('${savedCursor}'), auto`;
            else document.body.style.cursor = "auto";
        }

        function applyPersonalize() {
            const wallUrl = document.getElementById('inp-wall').value.trim();
            const cursorUrl = document.getElementById('inp-cursor').value.trim();
            if(wallUrl) { localStorage.setItem('lucid_wall', wallUrl); document.getElementById('desktop').style.backgroundImage = `url('${wallUrl}')`; }
            if(cursorUrl) { localStorage.setItem('lucid_cursor', cursorUrl); document.body.style.cursor = `url('${cursorUrl}'), auto`; }
            closePersonalize(); showToast('Screen Personalized', 'image');
        }

        function resetPersonalize() { localStorage.removeItem('lucid_wall'); localStorage.removeItem('lucid_cursor'); loadPersonalization(); closePersonalize(); showToast('Restored Default', 'refresh-cw'); }
        function openPersonalize() { closeAllMenus(); document.getElementById('personalize-modal').classList.add('active'); }
        function closePersonalize() { document.getElementById('personalize-modal').classList.remove('active'); }

        // --- CONTEXT MENU ---
        function openContextMenu(e) {
            e.preventDefault(); closeAllMenus();
            const menu = document.getElementById('context-menu');
            menu.style.display = 'flex';
            let x = e.pageX; let y = e.pageY;
            if (x + 240 > window.innerWidth) x = window.innerWidth - 250;
            if (y + 150 > window.innerHeight) y = window.innerHeight - 160;
            menu.style.left = `${x}px`; menu.style.top = `${y}px`;
        }
        function refreshKernel() { document.getElementById('context-menu').style.display = 'none'; const desk = document.getElementById('desktop'); desk.style.transform = "scale(0.98)"; desk.style.opacity = "0.8"; setTimeout(() => { desk.style.transform = "scale(1)"; desk.style.opacity = "1"; showToast('Kernel Refreshed', 'cpu'); }, 300); }
        function openFullscreen() { document.getElementById('context-menu').style.display = 'none'; if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else if (document.exitFullscreen) document.exitFullscreen(); }

        // --- TIME & UI CONTROLS ---
        function startClock() {
            const update = () => {
                const now = new Date();
                document.getElementById('tb-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('dw-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                document.getElementById('dw-date').innerText = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
            }; setInterval(update, 1000); update();
        }

        function handleDesktopClick(e) { if(e.button === 0) closeAllMenus(); }
        
        function closeAllMenus() {
            document.getElementById('launchpad').classList.remove('active');
            document.getElementById('context-menu').style.display = 'none';
            document.getElementById('desktop').classList.remove('blurred');
            document.getElementById('desktop-widget').style.opacity = '1';
        }

        function toggleStart() {
            const lp = document.getElementById('launchpad');
            if (lp.classList.contains('active')) closeAllMenus();
            else { lp.classList.add('active'); document.getElementById('desktop').classList.add('blurred'); document.getElementById('desktop-widget').style.opacity = '0'; setTimeout(() => document.getElementById('app-search').focus(), 100); }
        }

        function showToast(msg, iconName = 'info') {
            const area = document.getElementById('toast-area');
            const toast = document.createElement('div');
            toast.className = 'bg-zinc-800 border border-white/10 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 text-sm font-medium transform transition-all duration-300 translate-y-10 opacity-0';
            toast.innerHTML = `<i data-lucide="${iconName}" class="w-4 h-4 text-blue-400"></i> ${msg}`;
            area.appendChild(toast); lucide.createIcons();
            setTimeout(() => { toast.classList.remove('translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function filterApps() {
            const query = document.getElementById('app-search').value.toLowerCase();
            document.querySelectorAll('.app-item').forEach(app => {
                const name = app.dataset.name + " " + app.querySelector('.app-label').innerText.toLowerCase();
                app.style.display = name.includes(query) ? 'flex' : 'none';
            });
        }

        // --- WINDOW MANAGER (MOBILE RESPONSIVE) ---
        let zIndex = 100;
        let activeApps = {};

        function launch(key, title, url, w, h) {
            closeAllMenus();
            if (activeApps[key]) {
                const win = activeApps[key].window;
                if (!win.classList.contains('open')) restoreWindow(key); else focusWindow(win);
                return;
            }
            createWindow(key, title, url, w, h); addToTaskbar(key);
        }

        function createWindow(key, title, url, w, h) {
            zIndex++;
            const win = document.createElement('div');
            win.className = 'window lucid-glass pointer-events-auto';
            win.id = `win-${key}`;
            
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                win.style.width = '100%'; win.style.height = 'calc(100% - 32px)'; win.style.left = '0px'; win.style.top = '32px'; win.dataset.max = 'true';
            } else {
                const x = Math.max(0, (window.innerWidth/2) - (w/2) + (Math.random()*40-20));
                const y = Math.max(40, (window.innerHeight/2) - (h/2) + (Math.random()*40-20));
                win.style.width = `${w}px`; win.style.height = `${h}px`; win.style.left = `${x}px`; win.style.top = `${y}px`; win.dataset.max = 'false';
            }
            win.style.zIndex = zIndex;

            win.innerHTML = `
                <div class="win-header" onmousedown="startDrag(event, '${key}')" ontouchstart="startDrag(event, '${key}')" ondblclick="maximizeWindow('${key}')">
                    <div class="flex items-center gap-2 pointer-events-none"><span class="text-xs font-semibold text-gray-200 tracking-wide">${title}</span></div>
                    <div class="win-controls" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                        <div class="win-btn btn-min" onclick="minimizeWindow('${key}')"></div>
                        <div class="win-btn btn-max" onclick="maximizeWindow('${key}')"></div>
                        <div class="win-btn btn-close" onclick="closeWindow('${key}')"></div>
                    </div>
                </div>
                <div class="win-content"><div class="drag-shield"></div><iframe src="${url}"></iframe></div>
            `;

            win.addEventListener('mousedown', () => focusWindow(win));
            win.addEventListener('touchstart', () => focusWindow(win), {passive: true});
            
            document.getElementById('windows').appendChild(win);
            requestAnimationFrame(() => win.classList.add('open'));
            activeApps[key] = { window: win, w: w, h: h };
            focusWindow(win);
        }

        function addToTaskbar(key) {
            const bar = document.getElementById('task-apps');
            const icon = document.createElement('div');
            icon.className = 'dock-icon active'; icon.id = `task-${key}`; icon.onclick = () => launch(key);
            const appItem = document.querySelector(`.app-item[data-name="${key}"] .app-icon-lg`);
            if(appItem) {
                let srcIcon = appItem.cloneNode(true);
                srcIcon.className = "w-full h-full flex items-center justify-center text-[20px]";
                srcIcon.style.boxShadow = "none"; icon.appendChild(srcIcon);
            }
            bar.appendChild(icon);
        }

        function focusWindow(win) { zIndex++; win.style.zIndex = zIndex; document.querySelectorAll('.window').forEach(w => w.classList.remove('active')); win.classList.add('active'); }
        function closeWindow(key) { const win = activeApps[key].window; win.classList.remove('open'); setTimeout(() => { win.remove(); document.getElementById(`task-${key}`)?.remove(); delete activeApps[key]; }, 250); }
        function minimizeWindow(key) { const win = activeApps[key].window; win.classList.remove('open'); win.style.pointerEvents = 'none'; document.getElementById(`task-${key}`)?.classList.remove('active'); }
        function restoreWindow(key) { const win = activeApps[key].window; win.classList.add('open'); win.style.pointerEvents = 'auto'; document.getElementById(`task-${key}`)?.classList.add('active'); focusWindow(win); }

        function maximizeWindow(key) {
            const win = activeApps[key].window;
            if (window.innerWidth <= 768) return; 
            focusWindow(win);
            if(win.dataset.max === 'true') { win.style.width = win.dataset.w; win.style.height = win.dataset.h; win.style.left = win.dataset.x; win.style.top = win.dataset.y; win.style.borderRadius = "12px"; win.dataset.max = 'false'; } 
            else { win.dataset.w = win.style.width; win.dataset.h = win.style.height; win.dataset.x = win.style.left; win.dataset.y = win.style.top; win.style.width = '100%'; win.style.height = 'calc(100% - 32px)'; win.style.left = '0'; win.style.top = '32px'; win.style.borderRadius = "0"; win.dataset.max = 'true'; }
        }

        // --- DRAG PHYSICS ---
        let isDragging = false, dragWin = null, offset = {x:0, y:0};

        function startDrag(e, key) {
            const win = activeApps[key].window;
            if(win.dataset.max === 'true' || window.innerWidth <= 768) return; 
            isDragging = true; dragWin = win; focusWindow(win); win.classList.add('dragging');
            const rect = win.getBoundingClientRect();
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            offset.x = clientX - rect.left; offset.y = clientY - rect.top;
            document.addEventListener(e.type.includes('touch') ? 'touchmove' : 'mousemove', onDrag, {passive: false});
            document.addEventListener(e.type.includes('touch') ? 'touchend' : 'mouseup', stopDrag);
        }

        function onDrag(e) {
            if(!isDragging) return; e.preventDefault(); 
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            let x = clientX - offset.x; let y = clientY - offset.y;
            if(y < 32) y = 32; 
            dragWin.style.left = `${x}px`; dragWin.style.top = `${y}px`;
        }

        function stopDrag(e) {
            isDragging = false; if(dragWin) dragWin.classList.remove('dragging'); dragWin = null;
            document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag);
            document.removeEventListener('touchmove', onDrag); document.removeEventListener('touchend', stopDrag);
        }
    </script>
</body>
</html>
