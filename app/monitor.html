<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050507; color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        
        /* SIDEBAR */
        #sidebar { 
            width: 240px; background: rgba(10, 10, 12, 0.9); border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; padding: 20px 10px; z-index: 10;
        }
        
        .nav-item { 
            padding: 12px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            font-size: 13px; font-weight: 500; color: #a1a1aa; transition: 0.2s; margin-bottom: 4px;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.03); }
        .nav-item.active { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #fff; }
        
        .stat-mini { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; }
        .active.c-cpu { color: #3b82f6; } .active .s-cpu { color: #3b82f6; }
        .active.c-ram { color: #a855f7; } .active .s-ram { color: #a855f7; }
        .active.c-net { color: #10b981; } .active .s-net { color: #10b981; }

        /* MAIN WORKSPACE */
        #workspace { flex: 1; display: flex; flex-direction: column; background: #0a0a0c; position: relative; }
        
        /* HEADER */
        .header { 
            height: 80px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: flex-end; 
            padding: 0 30px 20px 30px; background: linear-gradient(to bottom, rgba(10,10,12,1), rgba(10,10,12,0));
        }
        
        /* CANVAS AREA */
        .graph-container { flex: 1; position: relative; padding: 30px; display: flex; flex-direction: column; }
        .canvas-wrapper { 
            flex: 1; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: #050507; 
            position: relative; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* INFO BAR */
        .info-bar { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px;
        }
        .info-card { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 8px; padding: 16px;
        }
        .info-label { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 4px; }
        .info-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: #e4e4e7; }

    </style>
</head>
<body>

    <div id="sidebar">
        <div class="px-3 py-2 mb-4">
            <h2 class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">System Telemetry</h2>
        </div>
        
        <div class="nav-item active c-cpu" onclick="switchView('cpu', this)">
            <div class="flex items-center gap-3"><i data-lucide="cpu" class="w-4 h-4"></i> CPU</div>
            <div class="stat-mini s-cpu" id="side-cpu">0%</div>
        </div>
        
        <div class="nav-item c-ram" onclick="switchView('ram', this)">
            <div class="flex items-center gap-3"><i data-lucide="memory-stick" class="w-4 h-4"></i> Memory</div>
            <div class="stat-mini s-ram" id="side-ram">0 GB</div>
        </div>
        
        <div class="nav-item c-net" onclick="switchView('net', this)">
            <div class="flex items-center gap-3"><i data-lucide="activity" class="w-4 h-4"></i> Network</div>
            <div class="stat-mini s-net" id="side-net">0 Kbps</div>
        </div>
    </div>

    <div id="workspace">
        <div class="header">
            <div>
                <h1 class="text-3xl font-bold tracking-tight" id="main-title">Processor Details</h1>
                <p class="text-sm text-gray-500 font-mono mt-1" id="main-sub">Lucid Compute Engine</p>
            </div>
        </div>

        <div class="graph-container">
            <div class="canvas-wrapper">
                <canvas id="graph"></canvas>
            </div>
            
            <div class="info-bar" id="info-bar">
                </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // --- STATE & CONFIG ---
        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        
        let currentView = 'cpu';
        const MAX_POINTS = 60; // Represents 60 seconds of history
        
        // Procedural Data Stores
        let history = {
            cpu: Array(MAX_POINTS).fill(10),
            ram: Array(MAX_POINTS).fill(4.2),
            net: Array(MAX_POINTS).fill(0)
        };

        // View Configs
        const configs = {
            cpu: { 
                title: "CPU History", sub: "Logical Processor Utilization",
                color: "59, 130, 246", // Blue
                max: 100, unit: "%"
            },
            ram: { 
                title: "Memory History", sub: "Physical RAM Allocation",
                color: "168, 85, 247", // Purple
                max: 16, unit: " GB" // Assuming 16GB max for simulation
            },
            net: { 
                title: "Network I/O", sub: "Bandwidth Fluctuations",
                color: "16, 185, 129", // Green
                max: 1000, unit: " Kbps"
            }
        };

        // --- SIMULATION ENGINE ---
        // Generates realistic looking wave data instead of pure randomness
        let timeSeed = 0;
        function generateData() {
            timeSeed += 0.1;
            
            // CPU: Base wave + sharp spikes
            let cpuVal = 20 + Math.sin(timeSeed) * 10 + Math.cos(timeSeed * 0.5) * 5;
            if(Math.random() > 0.9) cpuVal += Math.random() * 40; // Random spike
            cpuVal = Math.max(2, Math.min(98, cpuVal));
            history.cpu.push(cpuVal);
            history.cpu.shift();

            // RAM: Slow moving, relatively stable
            let ramVal = history.ram[MAX_POINTS-2] + (Math.random() * 0.2 - 0.1);
            if(Math.random() > 0.95) ramVal += Math.random() * 2; // Occasional app open
            ramVal = Math.max(3.0, Math.min(15.5, ramVal));
            history.ram.push(ramVal);
            history.ram.shift();

            // NET: Bursty traffic
            let netVal = Math.random() > 0.7 ? Math.random() * 800 : Math.random() * 50;
            history.net.push(netVal);
            history.net.shift();

            updateUI();
        }

        // --- UI UPDATES ---
        function switchView(view, el) {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('main-title').innerText = configs[view].title;
            document.getElementById('main-sub').innerText = configs[view].sub;
            
            updateBottomCards();
        }

        function updateBottomCards() {
            const bar = document.getElementById('info-bar');
            const latest = history[currentView][MAX_POINTS-1].toFixed(1);
            const conf = configs[currentView];

            if(currentView === 'cpu') {
                bar.innerHTML = `
                    <div class="info-card"><div class="info-label">Utilization</div><div class="info-val text-blue-400">${latest}%</div></div>
                    <div class="info-card"><div class="info-label">Base Speed</div><div class="info-val">3.20 GHz</div></div>
                    <div class="info-card"><div class="info-label">Processes</div><div class="info-val">${Math.floor(latest*3 + 120)}</div></div>
                    <div class="info-card"><div class="info-label">Up Time</div><div class="info-val">04:12:33</div></div>
                `;
            } else if (currentView === 'ram') {
                bar.innerHTML = `
                    <div class="info-card"><div class="info-label">In Use</div><div class="info-val text-purple-400">${latest} GB</div></div>
                    <div class="info-card"><div class="info-label">Available</div><div class="info-val">${(conf.max - latest).toFixed(1)} GB</div></div>
                    <div class="info-card"><div class="info-label">Speed</div><div class="info-val">4800 MHz</div></div>
                    <div class="info-card"><div class="info-label">Form Factor</div><div class="info-val">SODIMM</div></div>
                `;
            } else {
                bar.innerHTML = `
                    <div class="info-card"><div class="info-label">Send</div><div class="info-val text-green-400">${(latest*0.2).toFixed(0)} Kbps</div></div>
                    <div class="info-card"><div class="info-label">Receive</div><div class="info-val text-green-400">${latest} Kbps</div></div>
                    <div class="info-card"><div class="info-label">IPv4 Address</div><div class="info-val text-sm mt-1">192.168.1.104</div></div>
                    <div class="info-card"><div class="info-label">Connection</div><div class="info-val text-sm mt-1">LucidNet_5G</div></div>
                `;
            }
        }

        function updateUI() {
            // Update Sidebars
            document.getElementById('side-cpu').innerText = history.cpu[MAX_POINTS-1].toFixed(0) + '%';
            document.getElementById('side-ram').innerText = history.ram[MAX_POINTS-1].toFixed(1) + ' GB';
            document.getElementById('side-net').innerText = history.net[MAX_POINTS-1].toFixed(0) + ' Kb';
            
            // Re-render bottom cards dynamic values
            updateBottomCards();
        }

        // --- RENDER PIPELINE ---
        function resize() {
            const wrapper = document.querySelector('.canvas-wrapper');
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
        }
        window.addEventListener('resize', resize);

        function drawGraph() {
            requestAnimationFrame(drawGraph);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const data = history[currentView];
            const conf = configs[currentView];
            
            const w = canvas.width;
            const h = canvas.height;
            const step = w / (MAX_POINTS - 1);
            
            // 1. Draw Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            // Horizontal lines
            for(let i=0; i<=4; i++) {
                const y = (h/4) * i;
                ctx.moveTo(0, y); ctx.lineTo(w, y);
            }
            // Vertical lines
            for(let i=0; i<MAX_POINTS; i+=10) {
                const x = w - (i * step);
                ctx.moveTo(x, 0); ctx.lineTo(x, h);
            }
            ctx.stroke();

            // 2. Draw Graph Line & Fill
            ctx.beginPath();
            ctx.moveTo(0, h);
            
            for(let i=0; i<MAX_POINTS; i++) {
                const val = data[i];
                // Normalize value to height
                const normalized = val / conf.max;
                const y = h - (normalized * h);
                const x = i * step;
                
                if(i===0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            
            // Complete path for fill
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();

            // Gradient Fill
            const gradient = ctx.createLinearGradient(0, 0, 0, h);
            gradient.addColorStop(0, `rgba(${conf.color}, 0.4)`);
            gradient.addColorStop(1, `rgba(${conf.color}, 0.0)`);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Stroke Line
            ctx.beginPath();
            for(let i=0; i<MAX_POINTS; i++) {
                const val = data[i];
                const normalized = val / conf.max;
                const y = h - (normalized * h);
                const x = i * step;
                if(i===0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `rgb(${conf.color})`;
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        // Init
        resize();
        updateBottomCards();
        drawGraph();
        
        // Tick Engine
        setInterval(generateData, 1000); // 1 tick per second

    </script>
</body>
</html>
