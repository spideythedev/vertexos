<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid Real Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050507; color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        
        /* SIDEBAR */
        #sidebar { 
            width: 240px; background: rgba(10, 10, 12, 0.9); border-right: 1px solid rgba(255,255,255,0.05); 
            display: flex; flex-direction: column; padding: 20px 10px; z-index: 10;
        }
        
        .nav-item { 
            padding: 12px 16px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: space-between;
            font-size: 13px; font-weight: 500; color: #a1a1aa; transition: 0.2s; margin-bottom: 4px;
            border: 1px solid transparent;
        }
        .nav-item:hover { background: rgba(255,255,255,0.03); }
        .nav-item.active { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); color: #fff; }
        
        .stat-mini { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; }
        .active.c-mem { color: #a855f7; } .active .s-mem { color: #a855f7; }
        .active.c-fps { color: #3b82f6; } .active .s-fps { color: #3b82f6; }
        .active.c-net { color: #10b981; } .active .s-net { color: #10b981; }

        /* MAIN WORKSPACE */
        #workspace { flex: 1; display: flex; flex-direction: column; background: #0a0a0c; position: relative; }
        
        .header { 
            height: 80px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: flex-end; 
            padding: 0 30px 20px 30px; background: linear-gradient(to bottom, rgba(10,10,12,1), rgba(10,10,12,0));
        }
        
        .graph-container { flex: 1; position: relative; padding: 30px; display: flex; flex-direction: column; }
        .canvas-wrapper { 
            flex: 1; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: #050507; 
            position: relative; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        canvas { display: block; width: 100%; height: 100%; }

        .info-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }
        .info-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 16px; }
        .info-label { font-size: 11px; color: #71717a; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 4px; }
        .info-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; color: #e4e4e7; }
        .warning-text { font-size: 10px; color: #f59e0b; margin-top: 10px; display: none; }

    </style>
</head>
<body>

    <div id="sidebar">
        <div class="px-3 py-2 mb-4">
            <h2 class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Tab Telemetry (Real)</h2>
        </div>
        
        <div class="nav-item active c-mem" onclick="switchView('mem', this)">
            <div class="flex items-center gap-3"><i data-lucide="memory-stick" class="w-4 h-4"></i> JS Heap</div>
            <div class="stat-mini s-mem" id="side-mem">0 MB</div>
        </div>
        
        <div class="nav-item c-fps" onclick="switchView('fps', this)">
            <div class="flex items-center gap-3"><i data-lucide="monitor" class="w-4 h-4"></i> Render FPS</div>
            <div class="stat-mini s-fps" id="side-fps">0</div>
        </div>
        
        <div class="nav-item c-net" onclick="switchView('net', this)">
            <div class="flex items-center gap-3"><i data-lucide="wifi" class="w-4 h-4"></i> Downlink</div>
            <div class="stat-mini s-net" id="side-net">0 Mbps</div>
        </div>
    </div>

    <div id="workspace">
        <div class="header flex justify-between items-end w-full">
            <div>
                <h1 class="text-3xl font-bold tracking-tight" id="main-title">Memory Allocation</h1>
                <p class="text-sm text-gray-500 font-mono mt-1" id="main-sub">V8 JavaScript Heap Size</p>
            </div>
            <div class="text-[10px] text-emerald-500 font-mono border border-emerald-500/30 bg-emerald-500/10 px-2 py-1 rounded">LIVE SENSOR DATA</div>
        </div>

        <div class="graph-container">
            <div class="canvas-wrapper">
                <canvas id="graph"></canvas>
            </div>
            <div id="api-warning" class="warning-text">Note: Your browser is restricting accurate memory readings.</div>
            
            <div class="info-bar" id="info-bar"></div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        const warning = document.getElementById('api-warning');
        
        let currentView = 'mem';
        const MAX_POINTS = 60; // 60 ticks
        
        // Data Stores (Filled with 0s initially)
        let history = {
            mem: Array(MAX_POINTS).fill(0),
            fps: Array(MAX_POINTS).fill(60),
            net: Array(MAX_POINTS).fill(0)
        };

        const configs = {
            mem: { title: "Memory Allocation", sub: "V8 JavaScript Heap Size", color: "168, 85, 247", max: 500, unit: " MB" },
            fps: { title: "Render Performance", sub: "Browser Frames Per Second", color: "59, 130, 246", max: 120, unit: " FPS" },
            net: { title: "Network Downlink", sub: "Connection Speed Limit", color: "16, 185, 129", max: 100, unit: " Mbps" }
        };

        // --- REAL TELEMETRY LOGIC ---
        
        // 1. FPS Tracker
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let currentFps = 60;

        function trackFPS() {
            const now = performance.now();
            frameCount++;
            if (now - lastFpsTime >= 1000) {
                currentFps = Math.min(frameCount, 120); // Cap at 120 for sanity
                frameCount = 0;
                lastFpsTime = now;
            }
            requestAnimationFrame(trackFPS);
        }
        requestAnimationFrame(trackFPS);

        // 2. Data Polling (1 per second)
        function pollRealData() {
            // A. Memory (Chromium Only)
            let memUsage = 0;
            if (performance.memory) {
                memUsage = performance.memory.usedJSHeapSize / (1024 * 1024); // Convert to MB
                warning.style.display = 'none';
            } else {
                warning.style.display = 'block'; // Firefox/Safari don't support this
            }
            
            // Adjust graph max scale dynamically if app gets heavy
            if(memUsage > configs.mem.max * 0.8) configs.mem.max += 200;

            history.mem.push(memUsage);
            history.mem.shift();

            // B. FPS
            history.fps.push(currentFps);
            history.fps.shift();

            // C. Network (Chromium Only)
            let downlink = 0;
            if (navigator.connection && navigator.connection.downlink) {
                downlink = navigator.connection.downlink; // Returns Mbps
            }
            history.net.push(downlink);
            history.net.shift();

            updateUI();
        }

        // --- UI UPDATES ---
        function switchView(view, el) {
            currentView = view;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            
            document.getElementById('main-title').innerText = configs[view].title;
            document.getElementById('main-sub').innerText = configs[view].sub;
            
            updateBottomCards();
        }

        function updateBottomCards() {
            const bar = document.getElementById('info-bar');
            const latest = history[currentView][MAX_POINTS-1].toFixed(1);

            if(currentView === 'mem') {
                const totalHeap = performance.memory ? (performance.memory.totalJSHeapSize / (1024 * 1024)).toFixed(1) : 'Unknown';
                const limitHeap = performance.memory ? (performance.memory.jsHeapSizeLimit / (1024 * 1024)).toFixed(0) : 'Unknown';
                
                bar.innerHTML = `
                    <div class="info-card"><div class="info-label">Active Heap</div><div class="info-val text-purple-400">${latest} MB</div></div>
                    <div class="info-card"><div class="info-label">Total Allocated</div><div class="info-val">${totalHeap} MB</div></div>
                    <div class="info-card"><div class="info-label">Browser Limit</div><div class="info-val">${limitHeap} MB</div></div>
                    <div class="info-card"><div class="info-label">Engine</div><div class="info-val text-sm mt-1">V8 Engine</div></div>
                `;
            } else if (currentView === 'fps') {
                bar.innerHTML = `
                    <div class="info-card"><div class="info-label">Current FPS</div><div class="info-val text-blue-400">${Math.round(latest)}</div></div>
                    <div class="info-card"><div class="info-label">Hardware Concurrency</div><div class="info-val">${navigator.hardwareConcurrency || '?'} Cores</div></div>
                    <div class="info-card"><div class="info-label">Platform</div><div class="info-val text-sm mt-1">${navigator.platform}</div></div>
                    <div class="info-card"><div class="info-label">Device RAM Class</div><div class="info-val">${navigator.deviceMemory || '?'} GB+</div></div>
                `;
            } else {
                const connType = navigator.connection ? navigator.connection.effectiveType : 'Unknown';
                const rtt = navigator.connection ? navigator.connection.rtt : 'Unknown';
                
                bar.innerHTML = `
                    <div class="info-card"><div class="info-label">Downlink Limit</div><div class="info-val text-green-400">${latest} Mbps</div></div>
                    <div class="info-card"><div class="info-label">Effective Type</div><div class="info-val uppercase">${connType}</div></div>
                    <div class="info-card"><div class="info-label">Latency (RTT)</div><div class="info-val">${rtt} ms</div></div>
                    <div class="info-card"><div class="info-label">Status</div><div class="info-val text-sm mt-1">${navigator.onLine ? 'Online' : 'Offline'}</div></div>
                `;
            }
        }

        function updateUI() {
            document.getElementById('side-mem').innerText = history.mem[MAX_POINTS-1].toFixed(1) + ' MB';
            document.getElementById('side-fps').innerText = Math.round(history.fps[MAX_POINTS-1]);
            document.getElementById('side-net').innerText = history.net[MAX_POINTS-1].toFixed(1) + ' Mbps';
            updateBottomCards();
        }

        // --- RENDER PIPELINE ---
        function resize() {
            const wrapper = document.querySelector('.canvas-wrapper');
            canvas.width = wrapper.clientWidth;
            canvas.height = wrapper.clientHeight;
        }
        window.addEventListener('resize', resize);

        function drawGraph() {
            requestAnimationFrame(drawGraph);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const data = history[currentView];
            const conf = configs[currentView];
            const w = canvas.width;
            const h = canvas.height;
            const step = w / (MAX_POINTS - 1);
            
            // Grid
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for(let i=0; i<=4; i++) { const y = (h/4) * i; ctx.moveTo(0, y); ctx.lineTo(w, y); }
            for(let i=0; i<MAX_POINTS; i+=10) { const x = w - (i * step); ctx.moveTo(x, 0); ctx.lineTo(x, h); }
            ctx.stroke();

            // Line & Fill
            ctx.beginPath();
            ctx.moveTo(0, h);
            for(let i=0; i<MAX_POINTS; i++) {
                let val = data[i];
                if(currentView === 'fps' && val > conf.max) val = conf.max;
                const normalized = val / conf.max;
                const y = h - (normalized * h);
                const x = i * step;
                if(i===0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.lineTo(w, h);
            ctx.lineTo(0, h);
            ctx.closePath();

            const gradient = ctx.createLinearGradient(0, 0, 0, h);
            gradient.addColorStop(0, `rgba(${conf.color}, 0.5)`);
            gradient.addColorStop(1, `rgba(${conf.color}, 0.0)`);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Stroke
            ctx.beginPath();
            for(let i=0; i<MAX_POINTS; i++) {
                let val = data[i];
                if(currentView === 'fps' && val > conf.max) val = conf.max;
                const normalized = val / conf.max;
                const y = h - (normalized * h);
                const x = i * step;
                if(i===0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.strokeStyle = `rgb(${conf.color})`;
            ctx.lineWidth = 2;
            ctx.lineJoin = 'round';
            ctx.stroke();
        }

        // Init
        resize();
        pollRealData();
        drawGraph();
        setInterval(pollRealData, 1000); // 1 tick per second

    </script>
</body>
</html>
