<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid | Auth & Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050507; color: #fff; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* GLASS & INPUTS */
        .glass-panel { background: rgba(15, 15, 18, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .l-input { width: 100%; background: #000; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 16px; border-radius: 8px; outline: none; transition: 0.2s; margin-bottom: 16px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
        .l-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .l-btn { width: 100%; background: #3b82f6; color: white; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .l-btn:hover { background: #2563eb; }

        /* SCREENS */
        .screen { display: none; flex: 1; height: 100%; width: 100%; flex-direction: column; }
        .screen.active { display: flex; }

        /* STUDIO LAYOUT */
        #studio-layout { flex: 1; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: #0a0a0c; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .editor-area { flex: 1; background: #050507; display: flex; flex-direction: column; }
        .secrets-panel { width: 300px; background: #0a0a0c; border-left: 1px solid rgba(255,255,255,0.05); padding: 20px; }

        .file-item { padding: 8px 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #a1a1aa; border-left: 2px solid transparent; }
        .file-item:hover { background: rgba(255,255,255,0.03); color: white; }
        .file-item.active { background: rgba(59,130,246,0.1); border-left-color: #3b82f6; color: white; }

        /* TOP NAV */
        .top-nav { height: 50px; background: #121215; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        
        textarea.code-editor { flex: 1; background: transparent; color: #e4e4e7; font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 20px; border: none; outline: none; resize: none; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="screen-auth" class="screen active items-center justify-center relative">
        <div id="secret-logo" class="absolute top-8 left-8 cursor-pointer opacity-50 hover:opacity-100 transition duration-300" title="System Logo">
            <i data-lucide="droplet" class="w-8 h-8 text-blue-500"></i>
        </div>

        <div class="glass-panel p-10 w-[400px]">
            <h1 class="text-3xl font-bold mb-2 tracking-tight text-center">Lucid Identity</h1>
            <p class="text-gray-400 text-xs mb-8 text-center uppercase tracking-widest">Secure Access Node</p>

            <div id="auth-error" class="text-red-400 text-xs mb-4 text-center hidden"></div>

            <input type="email" id="auth-email" class="l-input" placeholder="Email Address">
            <input type="password" id="auth-pass" class="l-input" placeholder="Password">
            
            <button class="l-btn mb-4" id="btn-login">Initialize Session</button>
            <button class="l-btn bg-zinc-800 hover:bg-zinc-700" id="btn-register">Register New Identity</button>
        </div>
    </div>

    <div id="screen-admin" class="screen bg-[#0a0a0c]">
        <div class="top-nav">
            <div class="flex items-center gap-2 text-red-500 font-bold">
                <i data-lucide="shield-alert" class="w-5 h-5"></i> LUCID OVERSEER
            </div>
            <button class="text-xs font-bold text-gray-400 hover:text-white" onclick="switchScreen('auth')">Exit Admin</button>
        </div>
        <div class="p-10 max-w-4xl mx-auto w-full">
            <h2 class="text-2xl font-bold mb-6">Developer Applications</h2>
            <div class="glass-panel p-6" id="admin-list">
                <p class="text-zinc-500 text-sm">Fetching applications from Firestore...</p>
                </div>
        </div>
    </div>

    <div id="screen-studio" class="screen">
        <div class="top-nav">
            <div class="flex items-center gap-2 text-blue-400 font-bold">
                <i data-lucide="code-2" class="w-5 h-5"></i> Luco Studio
            </div>
            <div class="flex gap-3">
                <button class="bg-zinc-800 hover:bg-zinc-700 px-4 py-1.5 rounded text-xs font-bold transition" onclick="alert('Project Saved Locally')">Save</button>
                <button class="bg-blue-600 hover:bg-blue-500 px-4 py-1.5 rounded text-xs font-bold transition flex items-center gap-2 shadow-[0_0_15px_rgba(59,130,246,0.4)]" onclick="publishProject()">
                    <i data-lucide="upload-cloud" class="w-3 h-3"></i> Publish to Store
                </button>
                <button class="text-red-400 text-xs ml-4" id="btn-logout">Logout</button>
            </div>
        </div>

        <div id="studio-layout">
            <div class="sidebar pt-4">
                <div class="px-4 mb-4 flex justify-between items-center">
                    <span class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Project Files</span>
                    <div class="flex gap-2">
                        <i data-lucide="file-plus" class="w-4 h-4 text-gray-400 cursor-pointer hover:text-white" onclick="alert('Create File UI')"></i>
                        <i data-lucide="folder-plus" class="w-4 h-4 text-gray-400 cursor-pointer hover:text-white" onclick="alert('Create Folder UI')"></i>
                    </div>
                </div>
                <div class="file-item active"><i data-lucide="file-json" class="w-4 h-4 text-yellow-400"></i> lucid.config.json</div>
                <div class="file-item"><i data-lucide="file-code" class="w-4 h-4 text-blue-400"></i> main.js</div>
                <div class="file-item"><i data-lucide="file-code" class="w-4 h-4 text-blue-400"></i> engine.js</div>
                <div class="file-item"><i data-lucide="folder" class="w-4 h-4 text-gray-400"></i> assets/</div>
            </div>

            <div class="editor-area">
                <div class="h-10 bg-[#0a0a0c] border-b border-white/5 flex items-center px-4 text-xs font-mono text-gray-400">
                    lucid.config.json
                </div>
                <textarea class="code-editor" spellcheck="false">{
  "name": "My Epic App",
  "version": "1.0.0",
  "category": "Productivity",
  "icon": "<svg>...</svg>",
  "entryPoint": "main.js"
}</textarea>
            </div>

            <div class="secrets-panel">
                <h3 class="text-xs uppercase font-bold text-gray-500 tracking-widest mb-4">Environment Secrets</h3>
                <p class="text-[11px] text-gray-400 mb-4">Securely inject API keys into your runtime.</p>
                
                <div class="flex gap-2 mb-4">
                    <input type="text" class="l-input !mb-0 !p-2 !text-xs" placeholder="KEY">
                    <input type="password" class="l-input !mb-0 !p-2 !text-xs" placeholder="VALUE">
                </div>
                <button class="w-full bg-zinc-800 hover:bg-zinc-700 text-white text-xs py-2 rounded font-bold transition">Add Secret</button>
            </div>
        </div>
    </div>


    <script type="module">
        lucide.createIcons();

        // 1. IMPORT FIREBASE SDKS (Using your exact provided config versions)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // 2. YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBhkwFbMlD7DJPtNPV2cBfb3uwlvBSm7h0", // Note: Ensure this is your real key in production
            authDomain: "lucide-os.firebaseapp.com",
            projectId: "lucide-os",
            storageBucket: "lucide-os.firebasestorage.app",
            messagingSenderId: "211467529543",
            appId: "1:211467529543:web:fc5c65a89aef44c4823062",
            measurementId: "G-HJ5DWFL2S8"
        };

        // 3. INITIALIZE
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- UI ROUTING ---
        window.switchScreen = (screenId) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenId}`).classList.add('active');
        };

        const showError = (msg) => {
            const errEl = document.getElementById('auth-error');
            errEl.innerText = msg;
            errEl.classList.remove('hidden');
        };

        // --- AUTHENTICATION LOGIC ---
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                // Auth State Observer will handle routing
            } catch (error) {
                showError(error.message);
            }
        });

        document.getElementById('btn-register').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;
                
                // Create user profile in Firestore
                await setDoc(doc(db, "users", user.uid), {
                    email: user.email,
                    isDeveloper: false, // Must apply
                    applicationStatus: 'pending', // 'none', 'pending', 'approved', 'rejected'
                    createdAt: new Date()
                });
                
                alert("Identity Registered. Developer application submitted for review.");
            } catch (error) {
                showError(error.message);
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth);
        });

        // --- AUTH OBSERVER (The Core Router) ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Fetch user data from Firestore
                const userDoc = await getDoc(doc(db, "users", user.uid));
                
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    
                    if (userData.isDeveloper || userData.applicationStatus === 'approved') {
                        // UNLOCK LUCO STUDIO
                        switchScreen('studio');
                    } else if (userData.applicationStatus === 'pending') {
                        showError("Your Developer Account is pending Admin approval.");
                        signOut(auth); // Kick them out until approved
                    } else {
                        showError("You do not have Developer access.");
                        signOut(auth);
                    }
                } else {
                    showError("User record not found in database.");
                }
            } else {
                switchScreen('auth');
            }
        });

        // --- SECRET ADMIN BACKDOOR ---
        document.getElementById('secret-logo').addEventListener('click', async () => {
            const pass = prompt("IDENTIFY YOURSELF:");
            if (pass === "lucide@latestpass") {
                switchScreen('admin');
                loadAdminPanel();
            } else if (pass !== null) {
                alert("ACCESS DENIED.");
            }
        });

        async function loadAdminPanel() {
            const adminList = document.getElementById('admin-list');
            adminList.innerHTML = '<p class="text-zinc-500">Loading applications...</p>';
            
            try {
                const querySnapshot = await getDocs(collection(db, "users"));
                let html = '';
                
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (data.applicationStatus === 'pending') {
                        html += `
                            <div class="flex justify-between items-center p-4 bg-[#0a0a0c] border border-white/5 rounded-lg mb-2">
                                <div>
                                    <div class="font-bold text-sm">${data.email}</div>
                                    <div class="text-[10px] text-yellow-500 uppercase">Pending Approval</div>
                                </div>
                                <div class="flex gap-2">
                                    <button class="bg-green-600 hover:bg-green-500 text-white px-3 py-1 text-xs rounded font-bold" onclick="approveDev('${docSnap.id}')">Accept</button>
                                    <button class="bg-red-600 hover:bg-red-500 text-white px-3 py-1 text-xs rounded font-bold" onclick="rejectDev('${docSnap.id}')">Decline</button>
                                </div>
                            </div>
                        `;
                    }
                });
                
                adminList.innerHTML = html || '<p class="text-green-500 font-mono text-sm">No pending developer applications.</p>';
            } catch (e) {
                adminList.innerHTML = `<p class="text-red-500">Error fetching data: ${e.message}</p>`;
            }
        }

        // Expose admin functions to window so inline onclick can see them
        window.approveDev = async (uid) => {
            await updateDoc(doc(db, "users", uid), { isDeveloper: true, applicationStatus: 'approved' });
            alert("Developer Approved.");
            loadAdminPanel();
        };

        window.rejectDev = async (uid) => {
            await updateDoc(doc(db, "users", uid), { isDeveloper: false, applicationStatus: 'rejected' });
            alert("Developer Declined.");
            loadAdminPanel();
        };

        // --- STUDIO PUBLISH SIMULATION ---
        window.publishProject = () => {
            // In reality, this pushes the code to the 'apps' collection in Firestore
            alert("Compiling architecture...\nPushing to Lucid Store...\n\nStatus: PUBLISHED SUCCESSFULLY. Real rating system initialized.");
        };

    </script>
</body>
</html>
