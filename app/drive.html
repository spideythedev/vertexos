<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #0a0a0c; color: #fff; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        
        /* SIDEBAR */
        #sidebar { width: 200px; background: rgba(20, 20, 22, 0.8); border-right: 1px solid rgba(255,255,255,0.05); padding: 20px 10px; display: flex; flex-direction: column; gap: 4px; }
        .nav-item { padding: 8px 12px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 500; color: #a1a1aa; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .nav-item.active { background: rgba(59,130,246,0.15); color: #3b82f6; }
        
        /* MAIN CONTENT */
        #content { flex: 1; display: flex; flex-direction: column; background: #050507; position: relative; }
        
        /* HEADER */
        #header { height: 60px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; padding: 0 24px; justify-content: space-between; }
        .path-text { font-size: 14px; font-weight: 600; color: #e4e4e7; }
        
        /* FILE GRID */
        #drive-area { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 16px; align-content: flex-start; }
        
        .file-card { 
            width: 100px; padding: 12px; border-radius: 12px; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center;
            border: 1px solid transparent; transition: 0.1s;
        }
        .file-card:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.1); }
        .file-card.selected { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
        
        .file-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; }
        .file-name { font-size: 11px; color: #d4d4d8; word-break: break-all; line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        /* CONTEXT MENU */
        #context-menu {
            position: absolute; width: 180px; display: none; flex-direction: column;
            background: rgba(25, 25, 30, 0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border-radius: 8px; padding: 4px; z-index: 100;
        }
        .ctx-item {
            padding: 8px 12px; font-size: 12px; border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; gap: 8px; color: #e4e4e7;
        }
        .ctx-item:hover { background: #3b82f6; color: white; }

        /* EDITOR MODAL */
        #editor-modal {
            position: absolute; inset: 0; background: #0a0a0c; z-index: 200;
            display: none; flex-direction: column;
        }
        #editor-modal.active { display: flex; }
        
        .editor-header { height: 50px; background: #121215; border-bottom: 1px solid #27272a; display: flex; items-center; justify-content: space-between; padding: 0 16px; }
        #editor-title { background: transparent; border: none; color: white; font-size: 14px; font-weight: 600; outline: none; width: 300px; }
        #editor-content { flex: 1; background: #050507; color: #e4e4e7; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 13px; border: none; outline: none; resize: none; }
        
        .btn-action { background: #3b82f6; color: white; padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-action:hover { background: #2563eb; }
        .btn-close { background: transparent; color: #a1a1aa; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid #27272a; transition: 0.2s; }
        .btn-close:hover { background: #27272a; color: white; }

    </style>
</head>
<body>

    <div id="sidebar">
        <div class="px-3 py-2 mb-2">
            <h2 class="text-[10px] font-bold text-gray-500 tracking-widest uppercase">Locations</h2>
        </div>
        <div class="nav-item active">
            <i data-lucide="hard-drive" class="w-4 h-4 text-blue-400"></i> Local Disk (C:)
        </div>
        <div class="nav-item">
            <i data-lucide="folder" class="w-4 h-4 text-yellow-500"></i> Documents
        </div>
        <div class="nav-item">
            <i data-lucide="download" class="w-4 h-4 text-green-400"></i> Downloads
        </div>
        <div class="nav-item">
            <i data-lucide="image" class="w-4 h-4 text-purple-400"></i> Pictures
        </div>
    </div>

    <div id="content" oncontextmenu="showContextMenu(event)" onclick="handleClick(event)">
        
        <div id="header">
            <div class="path-text flex items-center gap-2">
                <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500"></i>
                <span>Lucid / Root / Documents</span>
            </div>
            <div class="text-xs text-gray-500" id="file-count">0 items</div>
        </div>

        <div id="drive-area">
            </div>

        <div id="context-menu">
            <div class="ctx-item" onclick="createNewFile()"><i data-lucide="file-plus" class="w-4 h-4"></i> New Text File</div>
            <div class="ctx-item" onclick="refreshDrive()"><i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh</div>
            <div class="h-px bg-white/10 my-1 mx-1"></div>
            <div class="ctx-item text-red-400" id="ctx-delete" style="display: none;" onclick="deleteSelected()"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete Selected</div>
        </div>
    </div>

    <div id="editor-modal">
        <div class="editor-header">
            <div class="flex items-center gap-3">
                <i data-lucide="file-text" class="w-4 h-4 text-blue-400"></i>
                <input type="text" id="editor-title" placeholder="Filename.txt">
            </div>
            <div class="flex items-center gap-2">
                <button class="btn-close" onclick="closeEditor()">Cancel</button>
                <button class="btn-action" onclick="saveFile()">Save File</button>
            </div>
        </div>
        <textarea id="editor-content" spellcheck="false" placeholder="Start typing..."></textarea>
    </div>

    <script>
        lucide.createIcons();

        // --- VIRTUAL FILE SYSTEM LOGIC ---
        let fs = JSON.parse(localStorage.getItem('lucid_drive_fs')) || [
            { 
                id: 1, 
                name: "Welcome.txt", 
                type: "text", 
                content: "Welcome to your drive, SpydeY.\n\nThis is a persistent virtual file system. You can create, edit, and delete files here. Everything is saved directly to your browser's memory." 
            }
        ];

        let selectedFileId = null;
        let editingFileId = null;

        const driveArea = document.getElementById('drive-area');
        const contextMenu = document.getElementById('context-menu');
        const editorModal = document.getElementById('editor-modal');

        function saveFS() {
            localStorage.setItem('lucid_drive_fs', JSON.stringify(fs));
            renderDrive();
        }

        function renderDrive() {
            driveArea.innerHTML = '';
            
            fs.forEach(file => {
                const card = document.createElement('div');
                card.className = `file-card ${selectedFileId === file.id ? 'selected' : ''}`;
                card.id = `file-${file.id}`;
                
                // Icon based on type
                let iconHTML = `<i data-lucide="file-text" class="w-10 h-10 text-blue-400"></i>`;
                if(file.type === 'folder') iconHTML = `<i data-lucide="folder" class="w-10 h-10 text-yellow-500 fill-yellow-500/20"></i>`;

                card.innerHTML = `
                    <div class="file-icon">${iconHTML}</div>
                    <div class="file-name">${file.name}</div>
                `;

                // Events
                card.onclick = (e) => {
                    e.stopPropagation();
                    selectFile(file.id);
                };
                
                card.ondblclick = (e) => {
                    e.stopPropagation();
                    openFile(file.id);
                };

                driveArea.appendChild(card);
            });
            
            document.getElementById('file-count').innerText = `${fs.length} items`;
            lucide.createIcons();
        }

        // --- INTERACTIONS ---
        function selectFile(id) {
            selectedFileId = id;
            document.querySelectorAll('.file-card').forEach(c => c.classList.remove('selected'));
            if(id) document.getElementById(`file-${id}`).classList.add('selected');
        }

        function handleClick(e) {
            // Click empty space = deselect and hide menu
            selectFile(null);
            contextMenu.style.display = 'none';
        }

        function showContextMenu(e) {
            e.preventDefault();
            // Did we right click a file?
            const fileCard = e.target.closest('.file-card');
            if (fileCard) {
                const id = parseInt(fileCard.id.replace('file-', ''));
                selectFile(id);
                document.getElementById('ctx-delete').style.display = 'flex';
            } else {
                selectFile(null);
                document.getElementById('ctx-delete').style.display = 'none';
            }

            contextMenu.style.display = 'flex';
            
            // Keep menu inside bounds
            let x = e.clientX;
            let y = e.clientY;
            if (x + 180 > window.innerWidth) x = window.innerWidth - 180;
            if (y + 150 > window.innerHeight) y = window.innerHeight - 150;
            
            contextMenu.style.left = `${x}px`;
            contextMenu.style.top = `${y}px`;
        }

        // --- FILE OPERATIONS ---
        function createNewFile() {
            contextMenu.style.display = 'none';
            const newFile = {
                id: Date.now(),
                name: "Untitled Document.txt",
                type: "text",
                content: ""
            };
            fs.push(newFile);
            saveFS();
            openFile(newFile.id); // Open immediately to edit
        }

        function deleteSelected() {
            contextMenu.style.display = 'none';
            if(selectedFileId) {
                fs = fs.filter(f => f.id !== selectedFileId);
                selectedFileId = null;
                saveFS();
            }
        }

        function refreshDrive() {
            contextMenu.style.display = 'none';
            driveArea.style.opacity = '0';
            setTimeout(() => {
                renderDrive();
                driveArea.style.opacity = '1';
            }, 200);
        }

        // --- EDITOR LOGIC ---
        function openFile(id) {
            const file = fs.find(f => f.id === id);
            if(file && file.type === 'text') {
                editingFileId = id;
                document.getElementById('editor-title').value = file.name;
                document.getElementById('editor-content').value = file.content;
                editorModal.classList.add('active');
                contextMenu.style.display = 'none';
            }
        }

        function closeEditor() {
            editorModal.classList.remove('active');
            editingFileId = null;
        }

        function saveFile() {
            if(editingFileId) {
                const fileIndex = fs.findIndex(f => f.id === editingFileId);
                if(fileIndex > -1) {
                    let newName = document.getElementById('editor-title').value.trim();
                    if(!newName.endsWith('.txt')) newName += '.txt'; // Force extension
                    
                    fs[fileIndex].name = newName || "Untitled.txt";
                    fs[fileIndex].content = document.getElementById('editor-content').value;
                    saveFS();
                }
            }
            closeEditor();
        }

        // Init
        renderDrive();

    </script>
</body>
</html>
