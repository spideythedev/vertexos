<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid Bridge | Host Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #050507; color: #fff; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        #header { height: 60px; background: rgba(20, 20, 22, 0.9); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        
        /* ACTION BUTTONS */
        .btn-real { background: #3b82f6; color: white; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; border: none; transition: 0.2s; box-shadow: 0 4px 10px rgba(59,130,246,0.2); }
        .btn-real:hover { background: #2563eb; box-shadow: 0 6px 15px rgba(59,130,246,0.4); transform: translateY(-1px); }
        .btn-real:active { transform: translateY(1px); }
        
        .btn-save { background: #10b981; box-shadow: 0 4px 10px rgba(16,185,129,0.2); }
        .btn-save:hover { background: #059669; box-shadow: 0 6px 15px rgba(16,185,129,0.4); }
        .btn-save:disabled { background: #3f3f46; color: #a1a1aa; cursor: not-allowed; box-shadow: none; transform: none; }

        /* EDITOR */
        #editor-container { flex: 1; display: flex; flex-direction: column; background: #0a0a0c; position: relative; }
        
        #file-info { padding: 10px 20px; background: #121215; border-bottom: 1px solid #27272a; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #a1a1aa; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
        .status-dot.connected { background: #10b981; box-shadow: 0 0 10px rgba(16,185,129,0.5); }

        #editor { flex: 1; background: transparent; color: #e4e4e7; padding: 20px; font-family: 'JetBrains Mono', monospace; font-size: 14px; border: none; outline: none; resize: none; line-height: 1.6; }
        
        /* SPLASH SCREEN */
        #splash { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050507; z-index: 10; transition: 0.3s; }
        #splash.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="header">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-zinc-800 rounded flex items-center justify-center border border-zinc-700">
                <i data-lucide="hard-drive" class="w-4 h-4 text-gray-300"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-wide">Host File Access</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Real OS Bridge</p>
            </div>
        </div>
        
        <div class="flex gap-3">
            <button class="btn-real" onclick="openFile()">
                <i data-lucide="folder-open" class="w-4 h-4"></i> Open Local File
            </button>
            <button class="btn-real btn-save" id="save-btn" onclick="saveFile()" disabled>
                <i data-lucide="save" class="w-4 h-4"></i> Save to Disk
            </button>
        </div>
    </div>

    <div id="editor-container">
        <div id="splash">
            <i data-lucide="file-terminal" class="w-16 h-16 text-zinc-700 mb-4"></i>
            <h2 class="text-xl font-bold text-gray-300 mb-2">No File Loaded</h2>
            <p class="text-sm text-gray-500 max-w-md text-center">Click "Open Local File" to grant Lucid OS permission to read and write to a real file on your physical hard drive.</p>
        </div>

        <div id="file-info">
            <div id="status-indicator" class="status-dot"></div>
            <span id="file-path">Disconnected</span>
        </div>
        <textarea id="editor" spellcheck="false" oninput="markUnsaved()"></textarea>
    </div>

    <script>
        lucide.createIcons();

        let fileHandle = null;
        let isUnsaved = false;

        const splash = document.getElementById('splash');
        const editor = document.getElementById('editor');
        const filePathDisplay = document.getElementById('file-path');
        const saveBtn = document.getElementById('save-btn');
        const statusIndicator = document.getElementById('status-indicator');

        // Check if browser supports the real File System API
        if (!window.showOpenFilePicker) {
            splash.innerHTML = `
                <i data-lucide="alert-triangle" class="w-16 h-16 text-red-500 mb-4"></i>
                <h2 class="text-xl font-bold text-gray-300 mb-2">API Not Supported</h2>
                <p class="text-sm text-gray-500 max-w-md text-center">Your browser does not support the File System Access API, or you are not running this on a local server (localhost) / HTTPS. Try opening this in Google Chrome or Edge via Live Server.</p>
            `;
            lucide.createIcons();
        }

        async function openFile() {
            try {
                // Open file picker dialog
                const [handle] = await window.showOpenFilePicker({
                    types: [
                        {
                            description: 'Text and Code Files',
                            accept: {
                                'text/*': ['.txt', '.html', '.css', '.js', '.json', '.md', '.py', '.cpp']
                            }
                        }
                    ],
                    excludeAcceptAllOption: false,
                    multiple: false
                });
                
                fileHandle = handle;
                
                // Get file contents
                const file = await fileHandle.getFile();
                const contents = await file.text();
                
                // Update UI
                editor.value = contents;
                filePathDisplay.innerText = `Connected: ${file.name}`;
                statusIndicator.classList.add('connected');
                splash.classList.add('hidden');
                
                saveBtn.disabled = true; // Disabled until they type something
                isUnsaved = false;

            } catch (err) {
                // User cancelled or error
                console.error("File open failed:", err);
            }
        }

        async function saveFile() {
            if (!fileHandle) return;

            try {
                // Request write permission
                const writable = await fileHandle.createWritable();
                
                // Write the contents of the textarea to the real file
                await writable.write(editor.value);
                
                // Close the file
                await writable.close();
                
                // Update UI
                isUnsaved = false;
                saveBtn.disabled = true;
                filePathDisplay.innerText = `Connected: ${fileHandle.name} (Saved)`;
                
                // Flash green
                saveBtn.innerText = "Saved!";
                setTimeout(() => {
                    saveBtn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> Save to Disk`;
                    lucide.createIcons();
                }, 2000);

            } catch (err) {
                console.error("Save failed:", err);
                alert("Failed to save. Did you grant write permission?");
            }
        }

        function markUnsaved() {
            if (!isUnsaved && fileHandle) {
                isUnsaved = true;
                saveBtn.disabled = false;
                filePathDisplay.innerText = `Connected: ${fileHandle.name} * (Unsaved)`;
            }
        }

        // Keyboard Shortcut: Ctrl/Cmd + S
        window.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                if (!saveBtn.disabled) saveFile();
            }
        });

    </script>
</body>
</html>
